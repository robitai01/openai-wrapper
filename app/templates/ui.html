<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI Wrapper Config UI</title>
  <link rel="stylesheet" href="/static/ui.css" />
</head>
<body>
  <div class="page">
    <header class="toolbar">
      <div>
        <h1>OpenAI Wrapper Config UI</h1>
        <div id="config-path" class="muted">Loading...</div>
      </div>
      <div class="toolbar-actions">
        <button id="form-mode-btn" class="secondary">Form Mode</button>
        <button id="raw-mode-btn" class="secondary">Raw Mode</button>
        <button id="reload-btn" class="secondary">重新加载</button>
        <button id="save-btn" class="primary">保存配置</button>
      </div>
    </header>

    <section id="status" class="status"></section>

    <main>
      <section id="form-mode" class="panel"></section>
      <section id="raw-mode" class="panel hidden">
        <label class="section-title" for="raw-editor">Raw YAML</label>
        <textarea id="raw-editor" spellcheck="false"></textarea>
      </section>
    </main>
  </div>

  <script id="initial-state" type="application/json">{{ {'ok': True}|tojson }}</script>
  <script src="/static/ui.js"></script>
</body>
</html>
